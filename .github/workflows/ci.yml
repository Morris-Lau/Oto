name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Resolve packages
        run: xcodebuild -project Oto.xcodeproj -scheme Oto -resolvePackageDependencies

      - name: Build for generic iOS Simulator
        run: xcodebuild -project Oto.xcodeproj -scheme Oto -destination 'generic/platform=iOS Simulator' build
